all:
  vars:
    homelab_source_of_truth:
      network_inventory_repo: artifacts/network-inventory.json
      generated_inventory: deploy/ansible/inventory/generated.yml
      automation_metadata: configs/automation-metadata.json
      live_evidence: artifacts/hc/*-lab-reachability.txt
  children:
    proxmox:
      hosts:
        alpha:
          ansible_host: 192.168.4.10
          platform_role: proxmox_host
          validation_ports: [22, 8006]
          state: reachable
    lxc:
      hosts:
        netbox:
          ansible_host: 192.168.4.140
          vmid: 100
          service_role: ipam_dcim
          validation_ports: [80, 443]
          state: icmp_only
        prometheus:
          ansible_host: 192.168.4.132
          vmid: 103
          service_role: monitoring
          validation_ports: [9090]
          state: partial
        prometheus-pve-exporter:
          ansible_host: 192.168.4.131
          vmid: 104
          service_role: pve_metrics
          validation_ports: [9221]
          state: unreachable_from_controller
        influxdb:
          ansible_host: 192.168.4.130
          vmid: 105
          service_role: telemetry_hub
          validation_ports: [8086]
          state: partial
        homepage:
          ansible_host: 192.168.4.139
          vmid: 106
          service_role: docs_portal
          validation_ports: [22, 80]
          state: reachable
        pihole:
          ansible_host: 192.168.4.208
          vmid: 109
          service_role: dns_infra
          validation_ports: [22, 53, 80]
          state: reachable
        ansible:
          ansible_host: null
          vmid: 111
          service_role: automation_control_node
          state: stopped
    netbox:
      hosts:
        netbox: {}
    monitoring:
      hosts:
        prometheus: {}
        prometheus-pve-exporter: {}
        influxdb: {}
    docs:
      hosts:
        homepage: {}
    dns:
      hosts:
        pihole: {}
    automation:
      hosts:
        ansible: {}
