---
- name: Stage OPNsense onboarding on Proxmox Alpha
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/future_opnsense.yml

  pre_tasks:
    - name: Ensure Proxmox API credentials are present
      ansible.builtin.assert:
        that:
          - lookup('ansible.builtin.env', 'PVE_API_USER') | length > 0
          - lookup('ansible.builtin.env', 'PVE_API_TOKEN_ID') | length > 0
          - lookup('ansible.builtin.env', 'PVE_API_TOKEN_SECRET') | length > 0
        fail_msg: >-
          Export PVE_API_USER, PVE_API_TOKEN_ID, and PVE_API_TOKEN_SECRET
          before running the Alpha onboarding playbook.

  tasks:
    - name: Report OPNsense onboarding target
      ansible.builtin.debug:
        msg:
          - "Target Proxmox node: {{ pve_node }}"
          - "Target Proxmox host: {{ pve_api_host }}"
          - "Planned VM name: {{ opnsense_vm_name }}"
          - "Planned VMID: {{ opnsense_vm_id }}"
          - "Bridge: {{ opnsense_bridge }}"
          - "Disk: {{ opnsense_disk_storage }} ({{ opnsense_disk_size }})"

    - name: Create or update the OPNsense VM shell on Alpha
      community.proxmox.proxmox_kvm:
        api_host: "{{ pve_api_host }}"
        api_user: "{{ lookup('ansible.builtin.env', 'PVE_API_USER') }}"
        api_token_id: "{{ lookup('ansible.builtin.env', 'PVE_API_TOKEN_ID') }}"
        api_token_secret: "{{ lookup('ansible.builtin.env', 'PVE_API_TOKEN_SECRET') }}"
        node: "{{ pve_node }}"
        vmid: "{{ opnsense_vm_id }}"
        name: "{{ opnsense_vm_name }}"
        memory: "{{ opnsense_memory_mb }}"
        cores: "{{ opnsense_cores }}"
        scsihw: virtio-scsi-pci
        scsi:
          scsi0: "{{ opnsense_disk_storage }}:{{ opnsense_disk_size }}"
        ide:
          ide2: "{{ opnsense_iso_storage }}:iso/{{ opnsense_iso_image }},media=cdrom"
        net:
          net0: "virtio,bridge={{ opnsense_bridge }}"
        boot: order=scsi0;ide2;net0
        onboot: true
        state: present
      check_mode: "{{ opnsense_check_mode }}"

    - name: Report post-creation next steps
      ansible.builtin.debug:
        msg:
          - "Boot the VM, complete the OPNsense installer, and enable the API."
          - "Then export OPNSENSE_API_KEY and OPNSENSE_API_SECRET for ansibleguy.opnsense tasks."
          - "Use NetBox CT 100 for IPAM updates once the management IP is assigned."
