workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - validate
  - dry-run
  - execute

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  ANSIBLE_CONFIG: "$CI_PROJECT_DIR/deploy/ansible/ansible.cfg"
  ANSIBLE_FORCE_COLOR: "true"

default:
  image: python:3.11-slim
  before_script:
    - python --version
    - python -m pip install --upgrade pip
    - python -m pip install ansible-core
    - apt-get update && apt-get install -y --no-install-recommends git openssh-client curl
  cache:
    paths:
      - .cache/pip

lint_workspace:
  stage: lint
  script:
    - python -m compileall scripts/session deploy/ansible
    - python scripts/session/workspace_health.py --strict --report artifacts/automation/workspace-health-report.json
    - python scripts/session/build_pipeline_metadata.py --output artifacts/automation/pipeline-metadata-summary.json
  artifacts:
    when: always
    paths:
      - artifacts/automation/*.json

validate_inventory:
  stage: validate
  script:
    - python scripts/session/generate_infra_artifacts.py --alpha-ip 192.168.4.10
    - ansible-galaxy collection install -r deploy/ansible/collections/requirements.yml
    - ansible-inventory -i deploy/ansible/inventory/generated.yml --list > artifacts/automation/gitlab-ansible-inventory.json
    - ansible-playbook -i deploy/ansible/inventory/lab/hosts.yml deploy/ansible/playbooks/lab-connectivity.yml --syntax-check
    - ansible-playbook -i deploy/ansible/inventory/lab/hosts.yml deploy/ansible/playbooks/proxmox-readonly-discovery.yml --syntax-check
    - ansible-playbook -i deploy/ansible/inventory/generated.yml deploy/ansible/playbooks/opnsense-alpha-onboard.yml --syntax-check
  artifacts:
    when: always
    paths:
      - artifacts/automation/*.json
      - reports/automation/*.json
      - deploy/ansible/inventory/generated.yml

dry_run_validation:
  stage: dry-run
  when: manual
  allow_failure: true
  script:
    - ansible-galaxy collection install -r deploy/ansible/collections/requirements.yml
    - ansible-playbook -i deploy/ansible/inventory/lab/hosts.yml deploy/ansible/playbooks/lab-connectivity.yml
    - |
      if [ -n "$PVE_API_USER" ] && [ -n "$PVE_API_TOKEN_ID" ] && [ -n "$PVE_API_TOKEN_SECRET" ]; then
        ansible-playbook -i deploy/ansible/inventory/generated.yml deploy/ansible/playbooks/opnsense-alpha-onboard.yml --check
      else
        echo "Skipping OPNsense dry-run: Proxmox API variables are not set."
      fi

manual_execute_opnsense:
  stage: execute
  when: manual
  allow_failure: false
  script:
    - ansible-galaxy collection install -r deploy/ansible/collections/requirements.yml
    - test -n "$PVE_API_USER"
    - test -n "$PVE_API_TOKEN_ID"
    - test -n "$PVE_API_TOKEN_SECRET"
    - ansible-playbook -i deploy/ansible/inventory/generated.yml deploy/ansible/playbooks/opnsense-alpha-onboard.yml
