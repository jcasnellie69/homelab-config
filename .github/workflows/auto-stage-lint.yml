name: Auto Stage & Lint Fix

on:
  schedule:
    - cron: '0 * * * *' # run at top of every hour
  workflow_dispatch: {}

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install ruff (for Python auto-fix)
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Make script executable
        run: |
          chmod +x ./scripts/ci/auto_stage_and_fix.sh

      - name: Run auto-stage-and-fix script
        run: |
          ./scripts/ci/auto_stage_and_fix.sh
