name: Workspace Health

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - ".devcontainer/**"
      - ".vscode/**"
      - "docs/**"
      - "WIKI/**"
      - "scripts/**"
      - "configs/**"
      - "deploy/**"
      - "mcp.json"
  pull_request:
    branches: [main]
    paths:
      - ".github/**"
      - ".devcontainer/**"
      - ".vscode/**"
      - "docs/**"
      - "WIKI/**"
      - "scripts/**"
      - "configs/**"
      - "deploy/**"
      - "mcp.json"
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install lint tools
        run: |
          npm install -g markdownlint-cli
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run markdownlint
        run: markdownlint "docs/**/*.md" "WIKI/**/*.md"

      - name: Run shellcheck
        run: |
          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -x
          fi

      - name: Run workspace health audit
        run: python scripts/session/workspace_health.py --strict --report artifacts/automation/workspace-health-report.json

      - name: Build metadata summary
        run: python scripts/session/build_pipeline_metadata.py --output artifacts/automation/pipeline-metadata-summary.json

      - name: Generate infra artifacts
        run: python scripts/session/generate_infra_artifacts.py --alpha-ip 192.168.4.10

      - name: Run tooling currency audit
        run: python scripts/session/tooling_currency.py --report artifacts/automation/tooling-currency-report.json

      - name: Run gitops monitor report
        run: python scripts/session/workspace_gitops_monitor.py --report artifacts/automation/workspace-gitops-monitor-report.json

      - name: Devcontainer smoke build
        run: docker build -f .devcontainer/Dockerfile .devcontainer -t homelab-config-devcontainer-ci

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workspace-health-artifacts
          path: |
            artifacts/automation/*.json
            reports/automation/*.json
            deploy/ansible/inventory/generated.yml
