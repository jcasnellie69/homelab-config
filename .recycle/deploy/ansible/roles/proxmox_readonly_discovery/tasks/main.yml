---
- name: Assert read-only mode
  ansible.builtin.assert:
    that:
      - proxmox_read_only | bool
    fail_msg: "This role is restricted to read-only discovery."

- name: Run Proxmox discovery commands
  ansible.builtin.command: "{{ item }}"
  register: proxmox_discovery_output
  changed_when: false
  loop: "{{ proxmox_discovery_commands }}"

- name: Show command summaries
  ansible.builtin.debug:
    msg:
      command: "{{ item.item }}"
      rc: "{{ item.rc }}"
      stdout_lines: "{{ item.stdout_lines[:20] }}"
  loop: "{{ proxmox_discovery_output.results }}"
  loop_control:
    label: "{{ item.item }}"
