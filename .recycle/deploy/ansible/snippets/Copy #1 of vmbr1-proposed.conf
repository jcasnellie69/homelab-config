# Proposed Proxmox /etc/network/interfaces snippet for the dedicated 10G VLAN trunk.
# Replace `nic2` with the actual live-validated 10G port (`nic2` or `nic3`).
# Do not attach an IP address to vmbr1.

iface nic2 inet manual

auto vmbr1
iface vmbr1 inet manual
    bridge-ports nic2
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes
    bridge-vids 2-4094
